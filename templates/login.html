<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sqush Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #121212; color: #fff; display: flex; font-family: sans-serif ;align-items: center; justify-content: center; height: 100vh; margin: 0;}
        .auth-card {
            width: 100%; max-width: 420px;
            background: #1e1e1e; padding: 40px;
            border: 4px solid #fff; box-shadow: 8px 8px 0px #000;
        }
        .form-control {border:3px solid #000; border-radius:0; background: #9a1818;color:#fff;font-weight: bold}
        .btn-danger {background: #e91e63;border:4px solid#000;font-weight:900;text-transform: uppercase;border-radius:0;}
        h2,h5 { text-transform: uppercase; font-weight:900; color:#ffeb3b;}
    </style>
</head>
<body>
<div class="auth-card">
    <h2 class="text-center mb-4 text-danger fw-bold">SQUSH STORE</h2>
    <h5 class="text-center mb-4 text-light">Login</h5>
    <form action="/login" method="POST">
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control bg-dark text-light border-secondary" required>
        </div>
        <div class="mb-4">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control bg-dark text-light border-secondary" required>
        </div>
        <button type="submit" class="btn btn-danger w-100 fw-bold py-2 mb-3">Login</button>
        <div class="text-center">
            <small class="text-light">Noch kein Account? <a href="/register" class="text-danger text-decoration-none">Kostenlos erstellen</a></small>
        </div>
    </form>
</div>
</body>
</html>
