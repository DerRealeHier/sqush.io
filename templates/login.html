<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sqush Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #0d0d12; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .auth-card { width: 100%; max-width: 420px; background: #15151c; padding: 40px; border-radius: 12px; border: 1px solid #252538; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
<div class="auth-card">
    <h2 class="text-center mb-4 text-danger fw-bold">SQUSH STORE</h2>
    <h5 class="text-center mb-4 text-light">Login</h5>
    <form action="/login" method="POST">
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control bg-dark text-light border-secondary" required>
        </div>
        <div class="mb-4">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control bg-dark text-light border-secondary" required>
        </div>
        <button type="submit" class="btn btn-danger w-100 fw-bold py-2 mb-3">Login</button>
        <div class="text-center">
            <small class="text-light">Noch kein Account? <a href="/register" class="text-danger text-decoration-none">Kostenlos erstellen</a></small>
        </div>
    </form>
</div>
</body>
</html>
