<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sqqush Register</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #121212; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .auth-card {
            width: 100%; max-width: 420px;
            background: #1e1e1e; padding: 40px;
            border: 4px solid #fff; box-shadow: 8px 8px 0px #000;
        }
        .form-control { border: 3px solid #000 !important; border-radius: 0 !important; background: #9a1818 !important; color: #fff !important; font-weight: bold; }
        .btn-danger { background: #e91e63; border: 4px solid #000; font-weight: 900; text-transform: uppercase; border-radius: 0; }
        h2, h5 { text-transform: uppercase; font-weight: 900; color: #ffeb3b; }
    </style>
</head>
<body>
<div class="auth-card">
    <h2 class="text-center mb-4 text-danger fw-bold">SQUSH ACCOUNT</h2>
    <h5 class="text-center mb-4 text-light ">Register</h5>
    <form method="POST" action="/register">
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" class="form-control bg-dark text-light border-secondary" id="username" name="username" placeholder="Username" required>
        </div>
        <div class="mb-3">
            <label class="form-label">E-Mail Address</label>
            <input type="email" name="email" class="form-control bg-dark text-light border-secondary" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control bg-dark text-light border-secondary" required>
        </div>
        <div class="mb-4">
            <label class="form-label">Account Type</label>
            <select name="role" class="form-control bg-dark text-light border-secondary">
                <option value="user">Gamer (Buy games & download them)</option>
                <option value="dev">Developer (Publish games)</option>
            </select>
        </div>
        <button type="submit" class="btn btn-danger w-100 fw-bold py-2 mb-3">Registrieren</button>
        <div class="text-center">
            <small class="text-light">Bereits registriert? <a href="/login" class="text-danger text-decoration-none">Hier einloggen</a></small>
        </div>
    </form>
</div>

</body>
</html>
