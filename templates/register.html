<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sqqush Register</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #0d0d12; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .auth-card { width: 100%; max-width: 420px; background: #15151c; padding: 40px; border-radius: 12px; border: 1px solid #252538; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
<div class="auth-card">
    <h2 class="text-center mb-4 text-danger fw-bold">SQUSH ACCOUNT</h2>
    <h5 class="text-center mb-4 text-light ">Register</
    h5>
    <form method="POST" action="/register">
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" class="form-control bg-dark text-light border-secondary" id="username" name="username" placeholder="Username" required>
        </div>
        <div class="mb-3">
            <label class="form-label">E-Mail Address</label>
            <input type="email" name="email" class="form-control bg-dark text-light border-secondary" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control bg-dark text-light border-secondary" required>
        </div>
        <div class="mb-4">
            <label class="form-label">Account Type</label>
            <select name="role" class="form-control bg-dark text-light border-secondary">
                <option value="user">Gamer (Buy games & download them)</option>
                <option value="dev">Developer (Publish games)</option>
            </select>
        </div>
        <button type="submit" class="btn btn-danger w-100 fw-bold py-2 mb-3">Registrieren</button>
        <div class="text-center">
            <small class="text-light">Bereits registriert? <a href="/login" class="text-danger text-decoration-none">Hier einloggen</a></small>
        </div>
    </form>
</div>

</body>
</html>
