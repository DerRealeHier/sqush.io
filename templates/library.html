<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #121212; color: #fff; font-family: sans-serif; }
        .comic-frame { border: 4px solid #fff; box-shadow: 6px 6px 0px #fff; padding: 20px; background: #1e1e1e; margin-bottom: 20px; }
    </style>
</head>
<body>
<div class="container py-5">
    <h1 class="text-warning text-uppercase fw-bold">My Library</h1>
    <hr>
    {% for game in games %}
    <div class="comic-frame d-flex justify-content-between align-items-center">
        <div>
            <h3>{{ game.title }}</h3>
            <p class="text-muted">{{ game.genre }}</p>
        </div>
        <div class="d-flex gap-2">
            <a href="{{ url_for('game_detail', game_id=game.id) }}" class="btn btn-outline-light">View</a>
            <a href="{{ url_for('static', filename=game.download_path) }}" class="btn btn-success fw-bold" download>DOWNLOAD</a>

            <form action="{{ url_for('remove_purchase', game_id=game.id) }}" method="POST" onsubmit="return confirm('Wirklich aus der Bibliothek entfernen?');">
                <button type="submit" class="btn btn-danger fw-bold">X</button>
            </form>
        </div>
    </div>

    {% else %}
    <p>No games yet. Time to go to the <a href="{{ url_for('store_front') }}">Store!</a></p>
    {% endfor %}
</div>
</body>
</html>
