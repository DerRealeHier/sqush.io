<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #121212; color: #fff; font-family: sans-serif; }
        .comic-frame { border: 4px solid #fff; box-shadow: 6px 6px 0px #fff; padding: 20px; background: #1e1e1e; margin-bottom: 20px; }
        .comic-frame{
            border: 5px solid #fff;
            box-shadow: 10px 10px 0px #ffeb3b;
            padding: 20px;
            background: #1a1a1a;
            margin-bottom: 30px;
        }

        .game-thumb{
            width: 120px;
            height:80px;
            object-fit: cover;
            border: 3px solid #fff;
            margin-right:20px;
        }
        h1{
            text-transform: uppercase;
            font-size:3rem;
            text-shadow:4px 4px 0px #ffeb3b;
            color: #fff;
        }
        .btn-comic {
            border: 3px solid #000;
            box-shadow:4px 4px 0px #000;
            font-weight:900;
            text-transform:uppercase;
        }
    </style>
</head>
<body>
<nav class="container p-4 d-flex justify-content-between align-items-center">
    <div>
        <a href="{{ url_for('home') }}" class="btn btn-outline-light fw-bold btn-comic" style="padding: 10px 20px;">HOME</a>
        <a href="{{ url_for('store_front') }}" class="btn btn-outline-light fw-bold btn-comic ms-3" style="padding: 10px 20px;">STORE</a>
    </div>
    <div class="comic-frame p-3" style="border: 3px solid #ffeb3b; box-shadow: 6px 6px 0px #ffeb3b;">
        {% if current_user.is_authenticated %}
        <span class="text-warning fw-bold me-3">{{ current_user.username }}</span>
        <a href="{{ url_for('logout') }}" class="btn btn-danger fw-bold" style="border: 2px solid #000;">LOGOUT</a>
        {% else %}
        <a href="{{ url_for('login') }}" class="btn btn-light fw-bold me-2" style="border: 2px solid #000;">LOGIN</a>
        <a href="{{ url_for('register') }}" class="btn btn-warning fw-bold" style="border: 2px solid #000;">REGISTER</a>
        {% endif %}
    </div>
</nav>
<div class="container py-5">
    <h1 class="mb-5 text-center">MY LIBRARY</h1>
    {% for game in games %}
    <div class="comic-frame d-flex align-items-center">
        <img src="{{ url_for('static', filename=game.image_path) }}" class="game-thumb" alt="Game Thumbnail">
        <div class="flex-grow-1">
            <h3 class="m-0">{{ game.title }}</h3>
            <p class="text-warning m-0">{{ game.genre }}</p>
        </div>
        <div class="d-flex gap-2">
            <a href="{{ url_for('game_detail', game_id=game.id) }}" class="btn btn-light btn-comic">VIEW</a>
            <a href="{{ url_for('static', filename=game.download_path) }}" class="btn btn-success btn-comic" download>DOWNLOAD</a>

            <form action="{{ url_for('remove_purchase', game_id=game.id) }}" method="POST" onsubmit="return confirm('Wirklich aus der Bibliothek entfernen?');">
                <button type="submit" class="btn btn-danger btn-comic">X</button>
            </form>
        </div>
    </div>
    {% else %}
    <div class="comic-frame text-center p-5">
        <h2 class="text-warning">LIBRARY EMPTY!</h2>
        <p>Time to hit the <a href="{{ url_for('store_front') }}" class="text-light">STORE</a> and get some games!</p>
    </div>
    {% endfor %}
</div>
</body>
</html>
