<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #0d0d0d; color: #fff; font-family: 'Arial Black', sans-serif; }
        .comic-frame { border: 5px solid #fff; box-shadow: 10px 10px 0px #ffeb3b; padding: 30px; background: #1a1a1a; }
        .btn-comic { border: 3px solid #000; box-shadow: 4px 4px 0px #000; font-weight: 900; text-transform: uppercase; }
        .user-card {
            border: 4px solid #fff;
            background: #2a2a2a;
            padding: 20px;
            text-align: center;
            transition: transform 0.2s;
            height: 100%;
        }
        .user-card:hover { transform: translateY(-10px); border-color: #ffeb3b; }
        .avatar-img { width: 120px; height: 120px; border: 4px solid #fff; border-radius: 50%; object-fit: cover; margin-bottom: 15px; }
    </style>
</head>
<body>
<div class="container py-5">
    <div class="comic-frame mb-4">
        <h1 class="text-center">FIND FRIENDS</h1>
        <form method="POST" class="mt-3">
            <input type="text" name="search" class="form-control btn-comic" placeholder="Search usernames...">
            <button type="submit" class="btn btn-warning btn-comic w-100 mt-2">SEARCH</button>
        </form>
    </div>

    <div class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4">
        {% for u in users %}
        <div class="col">
            <a href="{{ url_for('profile', username=u.username) }}" class="text-decoration-none">
                <div class="user-card">
                    <img src="{{ url_for('static', filename=u.profile_image) }}" class="avatar-img" alt="Avatar">
                    <h4 class="text-white">{{ u.username }}</h4>
                    <p class="text-warning small">{{ u.role }}</p>
                </div>
            </a>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
