<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sqush ~ Enter code</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='CSS/style.css') }}">
    <style>
        :root{
            --ink:#0d0d0d;
            --paper:#161616;
            --yellow:#ffe14d;
            --red:#ff3b30;
            --blue:#3aa0ff;
            --green:#33d17a;
        }

        body {
            background-color: var(--ink);
            background-image: radial-gradient(rgba(255,255,255,0.06) 1.5px, transparent 1.5px);
            background-size: 14px 14px;
            color: #fff;
            font-family: 'Comic Neue', sans-serif;
            display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0;
        }

        h2, h5 { font-family: 'Bangers', 'Comic Neue', sans-serif; letter-spacing: 1px; }

        .auth-card {
            width: 100%; max-width: 420px;
            background: var(--paper); padding: 40px;
            border: 4px solid #000; box-shadow: 10px 10px 0px #000;
            position: relative;
            margin: 40px 0;
        }

        .auth-card::before {
            content: "";
            position: absolute; top: -14px; left: 30px;
            width: 60px; height: 28px;
            background: var(--green);
            border: 3px solid #000;
            transform: rotate(-3deg);
        }

        h2 { color: var(--red); font-size: 2.2rem; -webkit-text-stroke: 1px #000; }
        h5 { color: var(--yellow); font-size: 1rem; }

        .otp-input {
            border: 3px solid #000 !important;
            border-radius: 0 !important;
            background: #222 !important;
            color: #fff !important;
            font-weight: 700;
            font-size: 2rem;
            letter-spacing: 12px;
            text-align: center;
        }
        .otp-input:focus {
            border-color: var(--yellow) !important;
            box-shadow: 3px 3px 0px var(--yellow) !important;
        }

        .btn-comic-auth {
            background: var(--green);
            border: 4px solid #000;
            color: #000;
            font-family: 'Bangers', sans-serif;
            letter-spacing: 1px;
            font-size: 1.4rem;
            border-radius: 0;
            box-shadow: 6px 6px 0px #000;
            transition: transform 0.1s ease;
        }
        .btn-comic-auth:hover { background: var(--green); color: #000; transform: translate(2px, 2px); box-shadow: 4px 4px 0px #000; }

        .flash-box {
            border: 3px solid #000;
            padding: 10px 14px;
            margin-bottom: 16px;
            font-weight: 700;
            font-size: 0.9rem;
        }
        .flash-error { background: var(--red); color: #fff; }
        .flash-success { background: var(--green); color: #000; }
        .flash-info { background: var(--blue); color: #000; }

        .resend-btn {
            background: none; border: none; color: var(--blue); font-weight: 700;
            text-decoration: underline; padding: 0; font-size: 0.85rem;
        }
        .resend-btn:hover { color: var(--yellow); }
    </style>
</head>
<body>
<div class="auth-card text-center">
    <h2 class="mb-3">SQUSH</h2>
    <h5 class="mb-4">Bestätigungscode eingeben</h5>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
            <div class="flash-box flash-{{ category }} text-start">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <p class="text-light" style="font-size:0.9rem;">
        We send a 6-number code to <strong>{{ email }}</strong>.
    </p>

    <form method="POST" action="{{ url_for('verify_2fa') }}">
        <div class="mb-4">
            <input type="text" name="code" class="form-control otp-input" maxlength="6"
                   inputmode="numeric" pattern="[0-9]*" autocomplete="one-time-code"
                   placeholder="------" required autofocus>
        </div>
        <button type="submit" class="btn btn-comic-auth w-100 py-2 mb-3">confirm</button>
    </form>

    <form method="POST" action="{{ url_for('resend_2fa') }}">
        <button type="submit" class="resend-btn">No Code? Send again</button>
    </form>
</div>
</body>
</html>
