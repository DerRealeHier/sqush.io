<!DOCTYPE html>
<html lang="en">
<head>
    <title>Let's go Gamb... Gaming</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #121212; color: #fff; font-family: 'Arial Black', sans-serif; }
        .comic-frame {
            border: 4px solid #fff;
            box-shadow: 8px 8px 0px #fff;
            padding: 40px;
            background: #1e1e1e;
            margin-top: 50px;
        }
        .nav-comic {
            border-bottom: 4px solid #fff;
            padding: 10px;
            background: #1e1e1e;
        }
        .btn-comic {
            border: 3px solid #fff;
            box-shadow: 4px 4px 0px #fff;
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
<nav class="nav-comic d-flex justify-content-center gap-3">
    <a href="{{ url_for('home') }}" class="btn btn-outline-light btn-comic">HOME</a>
    <a href="{{ url_for('store_front') }}" class="btn btn-outline-light btn-comic">STORE</a>
    <a href="{{ url_for('library') }}" class="btn btn-outline-light btn-comic">LIBRARY</a>
</nav>
<div class="container d-flex justify-content-center">
    <div class="comic-frame text-center">
        <h1 class="text-warning display-3">SUCCESS!</h1>
        <p class="fs-4"> You've got yourself <strong>{{ game.title }}</strong> </p>
        <p class="text-light">In 10 seconds you'll automatically get to you library </p>
        <div class="mt-4">
        <a href="{{ url_for('library') }}" class="btn btn-success btn-comic btn-lg">TO LIBRARY</a>
        </div>
    </div>
</div>

<script>
    setTimeout(function (){
        window.location.href = "{{ url_for('library') }}"
    }, 10000);
</script>
</body>
</html>
