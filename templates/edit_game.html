<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Game</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #121212; color: #fff; font-family: sans-serif; }
        .comic-panel { background: #1e1e1e; border: 4px solid #333; box-shadow: 8px 8px 0px #000; padding: 25px; }
        .form-control { border: 3px solid #000 !important; background: #9a1818 !important; color: #fff !important; font-weight: bold; }
        h2 { text-transform: uppercase; font-weight: 900; color: #ffeb3b; }
    </style>
</head>
<body>
<div class="container py-5">
    <div class="comic-panel">
        <h2>Edit: {{ game.title }}</h2>
        <form method="POST" enctype="multipart/form-data">
            <div class="mb-3">
                <label>Title</label>
                <input type="text" name="title" class="form-control" value="{{ game.title }}" required>
            </div>
            <div class="mb-3">
                <label>Price (€)</label>
                <input type="number" step="0.01" name="price" class="form-control" value="{{ game.price }}" required>
            </div>

            <div class="p-3 mb-3 border border-dark" style="background: #252525;">
                <div class="form-check form-switch mb-2">
                    <input type="checkbox" name="is_on_sale" class="form-check-input" id="saleSwitch" {% if game.is_on_sale %}checked{% endif %}>
                    <label class="form-check-label fw-bold" for="saleSwitch">Activate Sale</label>
                </div>
                <label>Discount (%)</label>
                <input type="number" name="discount_percent" class="form-control" value="{{ game.discount_percent }}" min="0" max="99">
            </div>
            <div class="mb-3">
                <label>Sale End Date</label>
                <input type="datetime-local" name="sale_end_date" class="form-control" >
            </div>

            <div class="mb-3">
                <label>Description</label>
                <textarea name="description" class="form-control">{{ game.description }}</textarea>
            </div>
            <div class="mb-3">
                <label>Add Screenshots</label>
                <input type="file" name="screenshots" multiple class="form-control" accept="image/*">
            </div>
            <div class="mb-3">
                <label>Add Videos</label>
                <input type="file" name="videos" multiple class="form-control" accept="video/mp4">
            </div>
            <button type="submit" class="btn btn-success w-100 fw-bold">SAVE CHANGES</button>
        </form>
    </div>
</div>
</body>
</html>
