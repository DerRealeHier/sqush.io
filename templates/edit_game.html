<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Game</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='CSS/style.css') }}">
    <style>
        /* cant get this into the sheet */
        :root{
            --ink:#0d0d0d;
            --paper:#161616;
            --yellow:#ffe14d;
            --red:#ff3b30;
            --blue:#3aa0ff;
            --green:#33d17a;
        }

        body {
            background-color: var(--ink);
            background-image: radial-gradient(rgba(255,255,255,0.06) 1.5px, transparent 1.5px);
            background-size: 14px 14px;
            color: #fff;
            font-family: 'Comic Neue', sans-serif;
        }

        h2, .comic-font { font-family: 'Bangers', 'Comic Neue', sans-serif; letter-spacing: 1px; }
        h2 { color: var(--yellow); font-size: 2.2rem; }

        .dev-panel {
            background: var(--paper);
            border: 4px solid #000;
            box-shadow: 10px 10px 0px #000;
            padding: 30px;
        }

        label { color: #bbb; font-weight: 700; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; }

        .form-control {
            border: 3px solid #000 !important;
            border-radius: 0 !important;
            font-weight: 700;
            background: #222 !important;
            color: #fff !important;
        }
        .form-control::placeholder { color: #888; }
        .form-control:focus {
            border-color: var(--yellow) !important;
            box-shadow: 3px 3px 0px var(--yellow) !important;
        }
        .form-check-input {
            border: 2px solid #000;
            width: 2.5em; height: 1.3em;
        }
        .form-check-input:checked { background-color: var(--green); border-color: #000; }

        .sale-box { background: #202020; border: 2px solid #000; padding: 15px; }

        .demo-hint { color: var(--blue); font-weight: 700; text-transform: none; letter-spacing: 0; }
        .demo-hint-empty { color: #888; font-weight: 700; text-transform: none; letter-spacing: 0; }

        .btn-save {
            background: var(--green);
            border: 4px solid #000;
            color: #000;
            font-family: 'Bangers', sans-serif;
            letter-spacing: 1px;
            font-size: 1.4rem;
            box-shadow: 6px 6px 0px #000;
            transition: transform 0.1s ease;
        }
        .btn-save:hover { background: var(--green); color: #000; transform: translate(2px, 2px); box-shadow: 4px 4px 0px #000; }
    </style>
</head>
<body>
<nav class="container p-4 d-flex justify-content-between align-items-center">
    <div>
        <a href="{{ url_for('home') }}" class="NavBar">HOME</a>
        <a href="{{ url_for('store_front') }}" class="NavBar ms-3">STORE</a>
        <a href="{{ url_for('developer_dashboard') }}" class="NavBar ms-3">DASHBOARD</a>
    </div>
    {% if current_user.is_authenticated %}
    <div class="comic-auth-box">
        <span class="comic-username">{{ current_user.username }}</span>
        <a href="{{ url_for('logout') }}" class="comic-logout-btn">LOGOUT</a>
    </div>
    {% else %}
    <div class="comic-auth-box">
        <a href="{{ url_for('login') }}" class="comic-logout-btn" style="background:#2196f3;">LOGIN</a>
        <a href="{{ url_for('register') }}" class="comic-logout-btn" style="background:#ffeb3b; color:#000;">REGISTER</a>
    </div>
    {% endif %}
</nav>

<div class="container py-4 pb-5">
    <div class="dev-panel">
        <h2 class="mb-4"><i class="bi bi-pencil-fill"></i> Edit: {{ game.title }}</h2>
        <form method="POST" enctype="multipart/form-data">
            <div class="mb-3">
                <label>Title</label>
                <input type="text" name="title" class="form-control" value="{{ game.title }}" required>
            </div>
            <div class="mb-3">
                <label>Price (€)</label>
                <input type="number" step="0.01" name="price" class="form-control" value="{{ game.price }}" required>
            </div>

            <div class="sale-box mb-3">
                <div class="form-check form-switch mb-2">
                    <input type="checkbox" name="is_on_sale" class="form-check-input" id="saleSwitch" {% if game.is_on_sale %}checked{% endif %}>
                    <label class="form-check-label" for="saleSwitch">Activate Sale</label>
                </div>
                <label>Discount (%)</label>
                <input type="number" name="discount_percent" class="form-control" value="{{ game.discount_percent }}" min="0" max="99">
            </div>
            <div class="mb-3">
                <label>Sale End Date</label>
                <input type="datetime-local" name="sale_end_date" class="form-control" >
            </div>

            <div class="mb-3">
                <label>Description</label>
                <textarea name="description" class="form-control" rows="4">{{ game.description }}</textarea>
            </div>
            <div class="mb-3">
                <label>Add Screenshots</label>
                <input type="file" name="screenshots" multiple class="form-control" accept="image/*">
            </div>
            <div class="mb-3">
                <label>Add Videos</label>
                <input type="file" name="videos" multiple class="form-control" accept="video/mp4">
            </div>
            <div class="mb-4">
                <label><i class="bi bi-controller"></i> Demo File</label><br>
                {% if game.demo_path %}
                <span class="demo-hint">Currently live &mdash; pick a file to replace it</span>
                {% else %}
                <span class="demo-hint-empty">None published yet</span>
                {% endif %}
                <input type="file" name="demo_file" class="form-control mt-2" accept=".zip,.exe">
            </div>
            <button type="submit" class="btn btn-save w-100">SAVE CHANGES</button>
        </form>
    </div>
</div>
</body>
</html>
